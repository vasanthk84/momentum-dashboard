<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan History Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f3f4f6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icons
    const Database = () => <svg className="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>;
    const Download = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
    const ArrowLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>;
    const TrendingUp = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>;
    const Calendar = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>;

    function App() {
      const [stats, setStats] = useState(null);
      const [scanHistory, setScanHistory] = useState([]);
      const [selectedDate, setSelectedDate] = useState('');
      const [selectedUniverse, setSelectedUniverse] = useState('');
      const [signalDetails, setSignalDetails] = useState(null);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        loadDatabaseStats();
        loadScanHistory();
      }, []);

      const loadDatabaseStats = async () => {
        try {
          const response = await fetch('/api/db/stats');
          const data = await response.json();
          setStats(data);
        } catch (err) {
          console.error('Failed to load stats:', err);
        }
      };

      const loadScanHistory = async () => {
        try {
          const response = await fetch('/api/db/scan-history?days=30');
          const data = await response.json();
          setScanHistory(data.scans || []);
        } catch (err) {
          console.error('Failed to load history:', err);
        }
      };

      const loadSignalDetails = async () => {
        if (!selectedDate) return;
        
        setLoading(true);
        try {
          const url = `/api/db/signals?date=${selectedDate}${selectedUniverse ? `&universe=${selectedUniverse}` : ''}`;
          const response = await fetch(url);
          const data = await response.json();
          setSignalDetails(data);
        } catch (err) {
          console.error('Failed to load signals:', err);
        } finally {
          setLoading(false);
        }
      };

      const exportToExcel = async (table) => {
        try {
          const response = await fetch(`/api/db/export?table=${table}`);
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${table}_export_${new Date().toISOString().split('T')[0]}.csv`;
          a.click();
        } catch (err) {
          console.error('Export failed:', err);
          alert('Export failed: ' + err.message);
        }
      };

      const exportFullHistory = async () => {
        try {
          const response = await fetch('/api/db/export-all');
          const data = await response.json();
          alert(`✅ Exported ${data.files.length} files:\n${data.files.join('\n')}`);
        } catch (err) {
          console.error('Full export failed:', err);
        }
      };

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-8">
          {/* Header */}
          <header className="mb-8">
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-4">
                <Database />
                <div>
                  <h1 className="text-3xl font-bold text-white">Scan History Database</h1>
                  <p className="text-gray-400">Query and export historical scan data</p>
                </div>
              </div>
              <a href="/" className="flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition">
                <ArrowLeft />
                <span>Back to Scanner</span>
              </a>
            </div>
          </header>

          {/* Database Statistics */}
          {stats && (
            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
              <div className="bg-gradient-to-br from-purple-900/20 to-pink-800/20 backdrop-blur-sm rounded-xl border border-purple-700/50 p-6">
                <p className="text-gray-400 text-sm">Total Scans</p>
                <p className="text-3xl font-bold text-purple-400 mt-1">{stats.unique_scan_dates || 0}</p>
              </div>
              <div className="bg-gradient-to-br from-blue-900/20 to-indigo-800/20 backdrop-blur-sm rounded-xl border border-blue-700/50 p-6">
                <p className="text-gray-400 text-sm">Weekly Entries</p>
                <p className="text-3xl font-bold text-blue-400 mt-1">{stats.weekly_total?.toLocaleString() || 0}</p>
              </div>
              <div className="bg-gradient-to-br from-green-900/20 to-emerald-800/20 backdrop-blur-sm rounded-xl border border-green-700/50 p-6">
                <p className="text-gray-400 text-sm">Daily Entries</p>
                <p className="text-3xl font-bold text-green-400 mt-1">{stats.daily_total?.toLocaleString() || 0}</p>
              </div>
              <div className="bg-gradient-to-br from-yellow-900/20 to-orange-800/20 backdrop-blur-sm rounded-xl border border-yellow-700/50 p-6">
                <p className="text-gray-400 text-sm">BUY Signals</p>
                <p className="text-3xl font-bold text-yellow-400 mt-1">{stats.buy_signals?.toLocaleString() || 0}</p>
              </div>
            </div>
          )}

          {/* Export Tools */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 p-6 mb-8">
            <h3 className="text-xl font-semibold text-white mb-4 flex items-center gap-2">
              <Download />
              Export to Excel
            </h3>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
              <button onClick={() => exportToExcel('weekly_watchlist')} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition flex items-center justify-center gap-2">
                <Download />
                Weekly Scans
              </button>
              <button onClick={() => exportToExcel('daily_signals')} className="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg transition flex items-center justify-center gap-2">
                <Download />
                Daily Signals
              </button>
              <button onClick={() => exportToExcel('performance_tracking')} className="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition flex items-center justify-center gap-2">
                <Download />
                Performance
              </button>
              <button onClick={() => exportToExcel('scan_metadata')} className="px-4 py-2 bg-yellow-600 hover:bg-yellow-700 rounded-lg transition flex items-center justify-center gap-2">
                <Download />
                Metadata
              </button>
              <button onClick={exportFullHistory} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition flex items-center justify-center gap-2 font-bold">
                <Download />
                Export ALL
              </button>
            </div>
          </div>

          {/* Query Interface */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 p-6 mb-8">
            <h3 className="text-xl font-semibold text-white mb-4 flex items-center gap-2">
              <Calendar />
              Query Historical Signals
            </h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-2">Select Date</label>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="w-full bg-gray-700 text-white border-gray-600 rounded-lg p-2.5"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-2">Universe (Optional)</label>
                <select
                  value={selectedUniverse}
                  onChange={(e) => setSelectedUniverse(e.target.value)}
                  className="w-full bg-gray-700 text-white border-gray-600 rounded-lg p-2.5"
                >
                  <option value="">All Universes</option>
                  <option value="Nifty_50">Nifty 50</option>
                  <option value="Nifty_Next_50">Nifty Next 50</option>
                  <option value="Large_Cap">Large Cap</option>
                  <option value="Mid_Cap">Mid Cap</option>
                  <option value="Small_Cap">Small Cap</option>
                </select>
              </div>
              <div className="flex items-end">
                <button
                  onClick={loadSignalDetails}
                  disabled={!selectedDate || loading}
                  className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-500 rounded-lg text-white font-bold py-2.5 px-6 transition"
                >
                  {loading ? 'Loading...' : 'Load Signals'}
                </button>
              </div>
            </div>
          </div>

          {/* Signal Details */}
          {signalDetails && (
            <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
              <div className="p-4 border-b border-gray-700">
                <h3 className="text-xl font-semibold text-green-400">
                  Signals for {selectedDate} {selectedUniverse && `(${selectedUniverse})`}
                </h3>
                <p className="text-sm text-gray-400 mt-1">
                  Total: {signalDetails.total} | BUY: {signalDetails.buy} | WAIT: {signalDetails.wait} | SKIP: {signalDetails.skip}
                </p>
              </div>
              <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-gray-700">
                  <thead className="bg-gray-700/50">
                    <tr>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Symbol</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Decision</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Grade</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Score</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Price</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Stop Loss</th>
                      <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Target 1</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-700">
                    {signalDetails.signals.map((signal, idx) => (
                      <tr key={idx} className={idx % 2 === 0 ? 'bg-gray-800' : 'bg-gray-900/50'}>
                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-white">{signal.symbol}</td>
                        <td className="px-6 py-4 whitespace-nowrap">
                          <span className={`px-2 py-1 rounded-full text-xs ${
                            signal.decision === 'BUY' ? 'bg-green-900/50 text-green-400' :
                            signal.decision === 'WAIT' ? 'bg-yellow-900/50 text-yellow-400' :
                            'bg-red-900/50 text-red-400'
                          }`}>
                            {signal.decision}
                          </span>
                        </td>
                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">{signal.grade}</td>
                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">{signal.score}</td>
                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">₹{signal.current_price?.toFixed(2)}</td>
                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-400">₹{signal.stop_loss?.toFixed(2)}</td>
                        <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-400">₹{signal.target_1?.toFixed(2)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Recent Scan History */}
          <div className="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden mt-8">
            <div className="p-4 border-b border-gray-700">
              <h3 className="text-xl font-semibold text-blue-400 flex items-center gap-2">
                <TrendingUp />
                Recent Scan History (Last 30 Days)
              </h3>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full divide-y divide-gray-700">
                <thead className="bg-gray-700/50">
                  <tr>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Date</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Type</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Universe</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">Total</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">BUY</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">WAIT</th>
                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase">SKIP</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-700">
                  {scanHistory.slice(0, 20).map((scan, idx) => (
                    <tr key={idx} className={idx % 2 === 0 ? 'bg-gray-800' : 'bg-gray-900/50'}>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-white">{scan.scan_date?.split('T')[0]}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">{scan.scan_type}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">{scan.universe}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-200">{scan.total_signals}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-green-400 font-bold">{scan.buy_signals}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-yellow-400">{scan.wait_signals}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-red-400">{scan.skip_signals}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
